# nginx configuration for Rails application behind ALB
# Serves as a reverse proxy to Puma via Unix socket,
# handles static assets, and enforces security headers.

upstream puma {
  server unix:///var/app/shared/tmp/sockets/puma.sock fail_timeout=0;
}

server {
  listen 80;
  server_name _;

  root /var/app/current/public;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Timeouts tuned for long-running requests (PDF generation, exports)
  client_max_body_size 25m;
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;
  proxy_connect_timeout 10s;
  send_timeout 120s;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1000;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Static assets — long cache, served directly by nginx
  # These are fingerprinted by the Rails asset pipeline
  location ^~ /assets/ {
    gzip_static on;
    expires max;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location ^~ /packs/ {
    gzip_static on;
    expires max;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Health check endpoint for ALB target group
  location = /health {
    proxy_pass http://puma;
    proxy_set_header Host $host;
    access_log off;
  }

  # All other requests proxied to Puma
  # IMPORTANT: no caching of dynamic responses
  location / {
    proxy_pass http://puma;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;

    # Disable buffering for streaming responses
    proxy_buffering off;

    # Do NOT cache dynamic responses
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    # WebSocket support (Action Cable)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Custom error pages
  error_page 500 502 503 504 /500.html;
  location = /500.html {
    root /var/app/current/public;
    internal;
  }
}
